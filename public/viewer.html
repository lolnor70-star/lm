<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Logs Viewer</title>
  <style>
    :root{--bg:#0f0f1a;--card:#1a1a2e;--acc:#e74c3c;--green:#2ecc71;--blue:#3498db;--txt:#e0e0e0;--muted:#777;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--txt);font-family:"Consolas","Courier New",monospace;font-size:13px;}

    header{background:var(--card);border-bottom:2px solid var(--acc);padding:14px 20px;
           display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
    header h1{font-size:17px;color:var(--acc);}
    .hbtns{display:flex;gap:8px;align-items:center;}
    .live{font-size:11px;color:var(--green);}
    button{background:var(--card);color:var(--txt);border:1px solid rgba(255,255,255,.12);
           padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;}
    button:hover{background:#2a2a40;}
    .btn-red{background:var(--acc);border-color:var(--acc);color:#fff;}

    .toolbar{padding:10px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
             background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.05);}
    .toolbar input,.toolbar select{background:#111827;color:var(--txt);
      border:1px solid rgba(255,255,255,.1);padding:6px 10px;border-radius:6px;
      font-size:12px;font-family:inherit;}
    .toolbar input{width:200px;}
    #ev-count{margin-right:auto;color:var(--muted);font-size:12px;}

    .layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 106px);}
    @media(max-width:680px){.layout{grid-template-columns:1fr;height:auto;}}

    .sess-list{border-left:1px solid rgba(255,255,255,.05);overflow-y:auto;padding:10px;}
    .sess-card{background:var(--card);border-radius:8px;padding:11px 13px;margin-bottom:7px;
               cursor:pointer;border:1px solid transparent;transition:.1s;}
    .sess-card:hover{border-color:rgba(231,76,60,.35);}
    .sess-card.active{border-color:var(--acc);}
    .sid{font-size:10px;color:var(--muted);margin-bottom:3px;}
    .stime{font-size:11px;color:var(--blue);margin-bottom:4px;}
    .sloc{font-size:11px;color:var(--green);margin-bottom:5px;}
    .sdev{font-size:11px;color:#aaa;margin-bottom:5px;}
    .pills{display:flex;gap:5px;flex-wrap:wrap;}
    .pill{font-size:10px;padding:2px 7px;border-radius:10px;}
    .p-dev{background:#1e3a5f;color:#7ab8f5;}
    .p-os{background:#1a3a1a;color:#7af57a;}
    .p-cl{background:#3a1a1a;color:#f57a7a;}

    .detail{overflow-y:auto;padding:18px;}
    .empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:15px;}

    .sec{margin-bottom:22px;}
    .sec-title{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;
               margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.05);}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:9px;}
    .ic{background:var(--card);border-radius:7px;padding:11px;}
    .ic .lbl{font-size:10px;color:var(--muted);margin-bottom:3px;}
    .ic .val{font-size:13px;word-break:break-all;}
    .vg{color:var(--green);}.vr{color:var(--acc);}.vb{color:var(--blue);}

    table{width:100%;border-collapse:collapse;}
    th{text-align:left;font-size:10px;color:var(--muted);letter-spacing:1px;
       padding:5px 9px;border-bottom:1px solid rgba(255,255,255,.05);}
    td{padding:6px 9px;border-bottom:1px solid rgba(255,255,255,.03);
       font-size:12px;vertical-align:top;max-width:280px;word-break:break-word;}
    tr:hover td{background:rgba(255,255,255,.02);}
    .et{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;}
    .et-page_view{background:#1a3a5a;color:#7ab8f5;}
    .et-click{background:#3a1a1a;color:#f57a7a;}
    .et-scroll{background:#1a3a1a;color:#7af57a;}
    .et-ip_resolved{background:#2a2a1a;color:#f5e27a;}
    .et-gps_granted{background:#1a2a3a;color:#7af5e2;}
    .et-gps_denied{background:#3a2a1a;color:#f5b07a;}
    .et-visibility{background:#2a1a3a;color:#c87af5;}
    .et-text_selected{background:#1a3a2a;color:#7af5b0;}
    .et-idle{background:#222;color:#888;}
    .et-page_leave{background:#3a1a2a;color:#f57ab0;}
    .et-battery{background:#2a3a1a;color:#c8f57a;}
    .det{color:var(--muted);font-size:11px;}
    .det b{color:var(--txt);}

    .int-row{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
    .int-lbl{min-width:150px;font-size:12px;}
    .int-wrap{flex:1;background:rgba(255,255,255,.05);border-radius:3px;height:10px;}
    .int-bar{height:100%;background:var(--acc);border-radius:3px;}
    .int-n{font-size:11px;color:var(--muted);min-width:28px;}
    a.map{color:var(--blue);font-size:11px;}
    .nodata{color:var(--muted);font-style:italic;font-size:12px;padding:10px 0;}
    #dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-left:6px;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  </style>
</head>
<body>

<header>
  <h1>📊 Tracker Logs <span id="dot"></span></h1>
  <div class="hbtns">
    <span class="live">🌐 lm-production-b297.up.railway.app</span>
    <span id="sess-count" style="color:var(--acc);font-size:12px"></span>
    <button onclick="load()">⟳ Refresh</button>
    <button onclick="exportJSON()">⬇ Export JSON</button>
    <button class="btn-red" onclick="clearAll()">🗑 Clear All</button>
  </div>
</header>

<div class="toolbar">
  <input id="q" type="text" placeholder="Search IP, city, device…" oninput="renderList()"/>
  <select id="fdev" onchange="renderList()">
    <option value="">All devices</option>
    <option value="mobile">Mobile</option>
    <option value="desktop">Desktop</option>
  </select>
  <select id="fev" onchange="renderDetail()">
    <option value="">All events</option>
    <option value="click">Clicks</option>
    <option value="scroll">Scroll</option>
    <option value="ip_resolved">IP resolved</option>
    <option value="gps_granted">GPS</option>
    <option value="text_selected">Text selected</option>
    <option value="page_leave">Page leave</option>
    <option value="battery">Battery</option>
  </select>
  <span id="ev-count"></span>
  <span id="last-refresh" style="color:var(--muted);font-size:11px"></span>
</div>

<div class="layout">
  <div class="sess-list" id="sess-list"><div class="nodata" style="padding:20px">Loading…</div></div>
  <div class="detail" id="detail"><div class="empty">← Select a session</div></div>
</div>

<script>
const API = "https://lm-production-b297.up.railway.app";
let sessions = [], activeId = null;

function ic(label, val, cls=""){
  return `<div class="ic"><div class="lbl">${label}</div><div class="val ${cls}">${val??'N/A'}</div></div>`;
}

async function load(){
  try{
    sessions = await fetch(API+"/api/logs").then(r=>r.json());
    document.getElementById("last-refresh").textContent =
      "last refresh: " + new Date().toLocaleTimeString();
    renderList();
    renderDetail();
  } catch(e) {
    document.getElementById("sess-list").innerHTML =
      `<div class="nodata" style="padding:20px;color:var(--acc)">
        ❌ Cannot reach server.<br>
        <span style="font-size:11px;color:var(--muted)">Check Railway is running.</span>
      </div>`;
  }
}

function filteredSess(){
  const q  = document.getElementById("q").value.toLowerCase();
  const dv = document.getElementById("fdev").value;
  return sessions.filter(s=>{
    if(dv && s.device?.deviceType !== dv) return false;
    if(q  && !JSON.stringify(s).toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderList(){
  const list = document.getElementById("sess-list");
  const data = filteredSess();
  document.getElementById("sess-count").textContent = sessions.length + " session" + (sessions.length!==1?"s":"");
  if(!data.length){ list.innerHTML='<div class="nodata" style="padding:20px">No sessions yet.</div>'; return; }

  list.innerHTML = data.map(s=>{
    const clicks = (s.events||[]).filter(e=>e.type==="click").length;
    const dev = s.device||{}, geo = s.geoIP||{};
    const active = s.sessionId===activeId ? " active" : "";
    return `<div class="sess-card${active}" onclick="sel('${s.sessionId}')">
      <div class="sid">${s.sessionId}</div>
      <div class="stime">🕐 ${new Date(s.startedAt).toLocaleString()}</div>
      <div class="sloc">📍 ${geo.city||"??"}, ${geo.country||"??"} — ${geo.ip||s.serverIp||"no IP"}</div>
      <div class="sdev">📱 ${dev.name||"Unknown device"}</div>
      <div class="pills">
        <span class="pill p-dev">${dev.deviceType||"?"} · ${dev.browser||"?"}</span>
        <span class="pill p-os">${dev.os||"?"}</span>
        <span class="pill p-cl">🖱 ${clicks}</span>
      </div>
    </div>`;
  }).join("");
}

function sel(id){ activeId=id; renderList(); renderDetail(); }

function renderDetail(){
  const panel = document.getElementById("detail");
  const s = filteredSess().find(x=>x.sessionId===activeId);
  if(!s){ panel.innerHTML='<div class="empty">← Select a session</div>'; return; }

  const dev=s.device||{}, geo=s.geoIP||{}, gps=s.gps||{};
  const bat=dev.battery||{}, net=dev.network||{};
  const fev = document.getElementById("fev").value;
  const evs = (s.events||[]).filter(e=>!fev||e.type===fev);
  document.getElementById("ev-count").textContent = evs.length + " events";

  const ints = Object.entries(s.interests||{}).sort((a,b)=>b[1]-a[1]);
  const mx = ints[0]?ints[0][1]:1;

  panel.innerHTML=`
  <div class="sec"><div class="sec-title">Session</div><div class="grid">
    ${ic("Session ID",`<span style="font-size:10px">${s.sessionId}</span>`,"vb")}
    ${ic("Started", new Date(s.startedAt).toLocaleString())}
    ${ic("Time on Page", (s.timeOnPage||0)+"s","vg")}
    ${ic("Scroll Depth", (s.scrollDepth||0)+"%","vg")}
    ${ic("Total Events", (s.events||[]).length)}
    ${ic("Referrer", s.referrer||"direct")}
  </div></div>

  <div class="sec"><div class="sec-title">Device Identity</div><div class="grid">
    ${ic("Device Name", dev.name,"vb")}
    ${ic("Device Type", dev.deviceType)}
    ${ic("OS", dev.os)}
    ${ic("Browser", dev.browser)}
    ${ic("Browser Version", dev.browserVersion)}
    ${ic("Platform", dev.platform)}
    ${ic("Language", dev.language)}
    ${ic("Languages", dev.languages)}
    ${ic("Timezone", dev.timezone)}
  </div></div>

  <div class="sec"><div class="sec-title">Screen & Display</div><div class="grid">
    ${ic("Screen", dev.screenRes)}
    ${ic("Viewport", (dev.viewportWidth||"?")+"x"+(dev.viewportHeight||"?"))}
    ${ic("Pixel Ratio", (dev.pixelRatio||"?")+"x")}
    ${ic("Color Depth", dev.colorDepth)}
    ${ic("Orientation", dev.orientation)}
    ${ic("Touch", dev.touchSupport?"Yes":"No")}
    ${ic("Max Touch Points", dev.maxTouchPoints)}
  </div></div>

  <div class="sec"><div class="sec-title">Hardware</div><div class="grid">
    ${ic("CPU Cores", dev.cpuCores)}
    ${ic("RAM", dev.ramGB+" GB")}
    ${ic("GPU Vendor", dev.gpuVendor)}
    ${ic("GPU Model", dev.gpuRenderer,"vg")}
    ${ic("Cameras", dev.cameras)}
    ${ic("Microphones", dev.microphones)}
    ${ic("Speakers", dev.speakers)}
  </div></div>

  <div class="sec"><div class="sec-title">Battery</div><div class="grid">
    ${ic("Level", bat.level,"vg")}
    ${ic("Charging", bat.charging===true?"⚡ Yes":bat.charging===false?"No":bat.charging)}
    ${ic("Charging Time", bat.chargingTime)}
    ${ic("Discharging Time", bat.dischargingTime)}
  </div></div>

  <div class="sec"><div class="sec-title">Connection</div><div class="grid">
    ${ic("Type", net.type)}
    ${ic("Effective Type", net.effectiveType,"vb")}
    ${ic("Downlink", net.downlink)}
    ${ic("RTT", net.rtt)}
    ${ic("Save Data", String(net.saveData))}
  </div></div>

  <div class="sec"><div class="sec-title">IP & Geolocation</div><div class="grid">
    ${ic("Public IP (client)", geo.ip,"vr")}
    ${ic("Server-side IP", s.serverIp,"vr")}
    ${ic("Local IPs (WebRTC)", (dev.localIPs||[]).join(", ")||"N/A","vr")}
    ${ic("City", geo.city)}
    ${ic("Region", geo.region)}
    ${ic("Country", geo.country)}
    ${ic("ISP / Org", geo.org)}
    ${ic("IP Timezone", geo.timezone)}
    ${ic("Coordinates", geo.loc)}
  </div></div>

  <div class="sec"><div class="sec-title">GPS Location</div>
  ${gps.granted
    ?`<div class="grid">
        ${ic("Latitude", gps.lat,"vg")}
        ${ic("Longitude", gps.lon,"vg")}
        ${ic("Accuracy", gps.accuracy)}
        ${ic("Altitude", gps.altitude)}
        <div class="ic"><div class="lbl">Google Maps</div>
          <a class="map" href="${gps.mapsLink}" target="_blank">📍 Open in Maps</a></div>
      </div>`
    :`<div class="nodata">GPS ${gps.granted===false?"denied by user":"not yet requested"}.</div>`}
  </div>

  <div class="sec"><div class="sec-title">Fingerprints</div><div class="grid">
    ${ic("Canvas FP", dev.canvasFingerprint,"vb")}
    ${ic("Audio FP", dev.audioFingerprint,"vb")}
  </div></div>

  <div class="sec"><div class="sec-title">Privacy</div><div class="grid">
    ${ic("Do Not Track", dev.doNotTrack)}
    ${ic("Cookies", dev.cookiesEnabled?"Enabled":"Disabled")}
    ${ic("Online", dev.onLine?"Yes":"No")}
  </div></div>

  <div class="sec"><div class="sec-title">Full User-Agent</div>
    <div class="ic" style="word-break:break-all;font-size:11px;color:var(--muted)">${dev.userAgent||"?"}</div>
  </div>

  ${ints.length?`
  <div class="sec"><div class="sec-title">Interests</div>
    ${ints.map(([k,v])=>`
      <div class="int-row">
        <div class="int-lbl">${k}</div>
        <div class="int-wrap"><div class="int-bar" style="width:${Math.round(v/mx*100)}%"></div></div>
        <div class="int-n">${v}x</div>
      </div>`).join("")}
  </div>`:""}

  <div class="sec"><div class="sec-title">Event Timeline (${evs.length})</div>
  <table>
    <thead><tr><th>#</th><th>Type</th><th>Time</th><th>Elapsed</th><th>Details</th></tr></thead>
    <tbody>
      ${evs.map((e,i)=>{
        const det=Object.entries(e)
          .filter(([k])=>!["type","time","elapsed"].includes(k))
          .map(([k,v])=>`<b>${k}:</b> ${String(v).slice(0,100)} `)
          .join("&nbsp; ");
        return `<tr>
          <td style="color:var(--muted)">${i+1}</td>
          <td><span class="et et-${e.type}">${e.type}</span></td>
          <td style="white-space:nowrap;color:var(--muted)">${new Date(e.time).toLocaleTimeString()}</td>
          <td style="color:var(--muted)">${e.elapsed||""}</td>
          <td class="det">${det}</td>
        </tr>`;
      }).join("")}
    </tbody>
  </table>
  </div>`;
}

async function clearAll(){
  if(!confirm("Delete ALL logs on the server?")) return;
  await fetch(API+"/api/logs",{method:"DELETE"});
  sessions=[]; activeId=null; renderList(); renderDetail();
}

function exportJSON(){
  const b = new Blob([JSON.stringify(sessions,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(b); a.download="logs_"+Date.now()+".json"; a.click();
}

// auto-refresh every 5s
setInterval(load, 5000);
load();
</script>
</body>
</html>
